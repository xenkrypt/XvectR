<!DOCTYPE html>
        <html>
        <head>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
            <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
            <style>
                body {
                    padding: 10px;
                    color: var(--vscode-editor-foreground);
                    display: flex;
                    flex-direction: column;
                    height: 100vh;
                    margin: 0;
                    box-sizing: border-box;

                }
                #chat {
                    flex-grow: 1; 
                    overflow-y: auto;
                    margin-bottom: 10px;
                    padding: 10px 5px;
                    border: 1px solid #00ff99;
                    display: flex;
                    flex-direction: column; 
                    gap: 20px;
                    /* border-radius: 10px; */

                }
                .message {
                    align-self: flex-start;
                    text-align: left;
                    word-wrap: break-word;
                    max-width: 90%;
                    padding: 10px 15px;
                    background: #3f3f3f;
                    outline: 1px solid #fe0000;
                    border-radius: 5px;
                    line-height: 1.2;
                    /* scrollbar-width: thin; */
                }
                .user-message {
                    align-self: flex-end;
                    text-align: right;
                    word-wrap: break-word;
                    max-width: 90%;
                    border-radius: 5px;
                    padding: 10px 15px;
                    line-height: 1.2;
                    background: #3f3f3f;
                    outline: 1px solid #007bff;
                }
                .copy-button {
                    position: absolute;
                    top: 10px;
                    right: 10px;
                    padding: 4px 10px;
                    border-radius: 6px;
                    border: none;
                    color: #d4baba;
                    background: #3f3f3f;
                    outline: 1px solid yellow;
                    /* outline-color: yellow; */
                    cursor: pointer;
                }
                #mentionMenu {
                    position: absolute;
                    bottom: 55px;
                    width: 350px;
                    max-height: 250px;
                    overflow-y: auto;
                    background: #1e1e1e;
                    border: 1px solid #555;
                    display: none;
                    z-index: 1000;
                }
                .hljs {
                    background: #1e1e1e !important;
                    color: #d4d4d4;
                    line-height: 1.2;
                }

                .hljs * {
                    background: transparent !important;
                }
                .message pre {
                    white-space: pre-wrap;
                    word-break: break-word;
                    overflow-wrap: anywhere;
                }



                ::selection {
                    background: #264f78;
}
                pre {
                    background: #1e1e1e;
                    padding: 10px;
                    border-radius: 5px;
                    overflow-x: auto;
                    white-space: pre-wrap;
                    word-break: break-word;
                }
                code { font-family: var(--vscode-editor-font-family); }
                .input-container {
                    display: flex;
                    width: 100%;
                    gap: 5px;
                }
                #input {
                    flex-grow: 1; 
                }
            </style>
        </head>
        <body>
            <h3>XvectR Chat</h3>
            <div id="chat"></div>

            <div class="input-container">
                <input id="input" type="text" placeholder="Type a message..." ></input>
                <button id="sendBtn" onclick="send()">Send</button>
                <div id = "mentionMenu"></div>
            </div>

            <script>
                const vscode = acquireVsCodeApi();
                const input = document.getElementById('input');
                const sendBtn = document.getElementById('sendBtn'); 
                let isGenerating = false;
                let selectedMentions = [];
                input.addEventListener('input',() => {
                    const cur = input.selectionStart;
                    const text = input.value.slice(0, cur);
                    const mat = text.match(/@([\w\-./]*)$/);
                    if (!mat) {
                        document.getElementById('mentionMenu').style.display = 'none';
                        return;
                    }
                    vscode.postMessage({ type: 'mention', text: mat[1] });
                });
                document.getElementById('input').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (isGenerating){
                            return;
                        }
                        send();
                    }
                });
                function setGeneratingState(state) {
                    isGenerating = state;
                    input.disabled = false;
                    sendBtn.disabled = state;
                    sendBtn.textContent = isGenerating ? 'Generating...' : 'Send';
                }

                function send() {
                    // const input = document.getElementById('chat');
                    // if (isGenerating) setGeneratingState(false) ;return;
                    const text = input.value;
                    if (!text) return;
                    input.value = '';
                    setGeneratingState(true);
                    vscode.postMessage({ type: 'chat', text: text });
                }
                let div = null;
                let contentDiv = null;
                let toolStatusDiv = null;
                let accumulatedText = '';
                // let copyb =  document.createElement('button');
                // copyb.textContent = 'Copy Code';
                // copyb.className = 'copy-button';
                // copyb.addEventListener('click', () => {
                //     const codeBlocks = div.querySelectorAll('pre code');
                //     codeBlocks.forEach(pre => {
                //         if (pre.querySelector('.copy-button')) return; 
                //         const
                        
                //     });
                // });
                // div.appendChild(copyb);

                // div.appendChild(copyb);
                window.addEventListener('message', event => {
                    const chatContainer = document.getElementById('chat');

                    if (event.data.type === 'start') {  
                        accumulatedText = '';
                        div = document.createElement('div');
                        div.className = 'message';
                        
                        toolStatusDiv = document.createElement('div');
                        // toolStatusDiv.style.fontStyle = 'bold';
                        toolStatusDiv.style.color = '#ffffff';
                        toolStatusDiv.style.marginBottom = '5px';
                        toolStatusDiv.style.fontSize = '120%';
                        toolStatusDiv.style.fontWeight = 'bold';
                        toolStatusDiv.style.display = 'none';
                        div.appendChild(toolStatusDiv);
                        
                        contentDiv = document.createElement('div');
                        div.appendChild(contentDiv);

                        chatContainer.appendChild(div);
                    } else if (event.data.type === 'tool_status') {
                        if (toolStatusDiv) {
                            toolStatusDiv.style.display = 'block';
                            toolStatusDiv.innerText = event.data.text;
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    } else if (event.data.type === 'render') {
                        if (contentDiv) {
                            if (toolStatusDiv) toolStatusDiv.style.display = 'none';
                            accumulatedText += event.data.text;
                            contentDiv.innerHTML = marked.parse(accumulatedText);
                            contentDiv.querySelectorAll('pre code').forEach((block) => {
                                hljs.highlightElement(block);
                            });
                        }
                    } else if (event.data.type === 'done') {
                        if (contentDiv) {
                            contentDiv.innerHTML = marked.parse(accumulatedText);
                            document.querySelectorAll('pre code').forEach((block) => {
                                hljs.highlightElement(block);
                            }); 
                            const codeBlocks = contentDiv.querySelectorAll('pre');
                        codeBlocks.forEach(pre => {
                            if (pre.querySelector('.copy-button')) return;
                            const copyb = document.createElement('button');
                            copyb.textContent = 'Copy Code';
                            copyb.className = 'copy-button';
                            pre.style.position = 'relative';
                            copyb.addEventListener('click', async () => {
                                try {
                                    const code = pre.querySelector('code');
                                    if (!code) return;
                                    await navigator.clipboard.writeText(code.innerText);
                                    copyb.textContent = 'Copied!';
                                    setTimeout(() => {
                                        copyb.textContent = 'Copy Code';
                                    }, 2000);
                                } catch (err) {
                                    console.error('Failed to copy text:', err);
                                }
                            });
                            pre.appendChild(copyb);
                        });
                        }
                        setGeneratingState(false);
                    } else if (event.data.type === 'user') {
                        const userdiv = document.createElement('div');
                        userdiv.className = 'message user-message';
                        userdiv.innerText = event.data.text;
                        chatContainer.appendChild(userdiv);
                    }else if (event.data.type === 'mention_suggestions') {
                        const menu = document.getElementById('mentionMenu');
                        menu.innerHTML = '';
                        event.data.suggestions.forEach(suggestion => {
                            const item = document.createElement('div');
                            item.textContent = suggestion;
                            item.style.padding = '5px 10px';
                            item.style.cursor = 'pointer';
                            item.addEventListener('click', () => {
                                const cur = input.selectionStart;
                                const textBefore = input.value.slice(0, cur);
                                const textAfter = input.value.slice(cur);
                                const newTextBefore = textBefore.replace(/@([\w\-./]*)$/, `@${suggestion} `);
                                input.value = newTextBefore + textAfter;
                                input.focus();
                                input.selectionStart = input.selectionEnd = newTextBefore.length;
                                menu.style.display = 'none';
                            });
                            menu.appendChild(item);
                        });
                        if (event.data.suggestions.length > 0) {
                            menu.style.display = 'block';
                        } else {
                            menu.style.display = 'none';
                        }
                    }
                    chatContainer.scrollTop = chatContainer.scrollHeight;
            
                });
            </script>
        </body>
        </html>
