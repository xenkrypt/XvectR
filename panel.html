<!DOCTYPE html>
        <html>
        <head>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
            <style>
                body {
                    padding: 10px;
                    color: var(--vscode-editor-foreground);
                    display: flex;
                    flex-direction: column;
                    height: 100vh;
                    margin: 0;
                    box-sizing: border-box;

                }
                #chat {
                    flex-grow: 1; 
                    overflow-y: auto;
                    margin-bottom: 10px;
                    padding: 10px 5px;
                    border: 1px solid #00ff99;
                    display: flex;
                    flex-direction: column; 
                    gap: 20px;
                    /* border-radius: 10px; */

                }
                .message {
                    align-self: flex-start;
                    text-align: left;
                    word-wrap: break-word;
                    max-width: 90%;
                    padding: 10px 15px;
                    background: #3f3f3f;
                    outline: 1px solid #fe0000;
                    border-radius: 5px;
                    line-height: 1.2;
                    /* scrollbar-width: thin; */
                }
                .user-message {
                    align-self: flex-end;
                    text-align: right;
                    word-wrap: break-word;
                    max-width: 90%;
                    border-radius: 5px;
                    padding: 10px 15px;
                    line-height: 1.2;
                    background: #3f3f3f;
                    outline: 1px solid #007bff;
                }
                .copy-button {
                    position: absolute;
                    top: 10px;
                    right: 10px;
                    padding: 4px 10px;
                    border-radius: 6px;
                    border: none;
                    color: #d4baba;
                    outline: 1px solid yellow;
                    /* outline-color: yellow; */
                    cursor: pointer;
                }
                .hljs {
                    background: #1e1e1e !important;
                    color: #d4d4d4;
                    line-height: 1.2;
                }

                .hljs * {
                    background: transparent !important;
                }



                ::selection {
                    background: #264f78;
}
                pre { background: #1e1e1e; padding: 10px; border-radius: 5px; overflow-x: auto; }
                code { font-family: var(--vscode-editor-font-family); }
                .input-container {
                    display: flex;
                    width: 100%;
                    gap: 5px;
                }
                #input {
                    flex-grow: 1; 
                }
            </style>
        </head>
        <body>
            <h3>XvectR Chat</h3>
            <div id="chat"></div>

            <div class="input-container">
                <input id="input" type="text" placeholder="Type a message..." ></textarea>
                <button id="sendBtn" onclick="send()">Send</button>
            </div>

            <script>
                const vscode = acquireVsCodeApi();
                const input = document.getElementById('input');
                const sendBtn = document.getElementById('sendBtn'); 
                let isGenerating = false;
                document.getElementById('input').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (isGenerating){
                            return;
                        }
                        send();
                    }
                });
                function setGeneratingState(state) {
                    isGenerating = state;
                    input.disabled = false;
                    sendBtn.disabled = state;
                    sendBtn.textContent = isGenerating ? 'Generating...' : 'Send';
                }

                function send() {
                    // const input = document.getElementById('chat');
                    // if (isGenerating) setGeneratingState(false) ;return;
                    const text = input.value;
                    if (!text) return;
                    input.value = '';
                    setGeneratingState(true);
                    vscode.postMessage({ type: 'chat', text: text });
                }
                let div = null;
                // let copyb =  document.createElement('button');
                // copyb.textContent = 'Copy Code';
                // copyb.className = 'copy-button';
                // copyb.addEventListener('click', () => {
                //     const codeBlocks = div.querySelectorAll('pre code');
                //     codeBlocks.forEach(pre => {
                //         if (pre.querySelector('.copy-button')) return; 
                //         const
                        
                //     });
                // });
                // div.appendChild(copyb);

                // div.appendChild(copyb);
                window.addEventListener('message', event => {
                    const chatContainer = document.getElementById('chat');

                    if (event.data.type === 'start') {  
                        div = document.createElement('div');
                        div.className = 'message';
                        // div.innerHTML = event.data.text;
                        chatContainer.appendChild(div);
                        
                    } else if (event.data.type === 'render') {
                        if (div) {
                            div.innerHTML = event.data.text;
                        }
                    } else if (event.data.type === 'done') {
                        const codeBlocks = div.querySelectorAll('pre');
                        codeBlocks.forEach(pre => {
                            if (pre.querySelector('.copy-button')) return;
                            const copyb = document.createElement('button');
                            copyb.textContent = 'Copy Code';
                            copyb.className = 'copy-button';
                            pre.style.position = 'relative';
                            copyb.addEventListener('click', async () => {
                                try {
                                    const code = pre.querySelector('code');
                                    if (!code) return;
                                    await navigator.clipboard.writeText(code.innerText);
                                    copyb.textContent = 'Copied!';
                                    setTimeout(() => {
                                        copyb.textContent = 'Copy Code';
                                    }, 2000);
                                } catch (err) {
                                    console.error('Failed to copy text:', err);
                                }
                            });
                            pre.appendChild(copyb);
                        });
                        setGeneratingState(false);
                    } else if (event.data.type === 'user') {
                        const userdiv = document.createElement('div');
                        userdiv.className = 'message user-message';
                        userdiv.innerText = event.data.text;
                        chatContainer.appendChild(userdiv);
                    }
                    chatContainer.scrollTop = chatContainer.scrollHeight;
            
                });
            </script>
        </body>
        </html>
