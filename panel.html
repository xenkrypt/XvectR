<!DOCTYPE html>
        <html>
        <head>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
            <style>
                body {
                    padding: 10px;
                    color: var(--vscode-editor-foreground);
                    display: flex;
                    flex-direction: column;
                    height: 100vh;
                    margin: 0;
                    box-sizing: border-box;

                }
                #chat {
                    flex-grow: 1; 
                    overflow-y: auto;
                    margin-bottom: 10px;
                    padding: 10px 5px;
                    border: 1px solid #00ff99;
                    display: flex;
                    flex-direction: column; 
                    gap: 20px;
                    /* border-radius: 10px; */

                }
                .message {
                    align-self: flex-start;
                    text-align: left;
                    word-wrap: break-word;
                    max-width: 90%;
                    padding: 10px 15px;
                    background: #3f3f3f;
                    outline: 1px solid #fe0000;
                    border-radius: 5px;
                    /* scrollbar-width: thin; */
                }
                .user-message {
                    align-self: flex-end;
                    text-align: right;
                    word-wrap: break-word;
                    max-width: 90%;
                    border-radius: 5px;
                    padding: 10px 15px;
                    background: #3f3f3f;
                    outline: 1px solid #007bff;
                }
                .hljs {
                    background: #1e1e1e !important;
                    color: #d4d4d4;
                }

                .hljs * {
                    background: transparent !important;
                }



                ::selection {
                    background: #264f78;
}
                pre { background: #1e1e1e; padding: 10px; border-radius: 5px; overflow-x: auto; }
                code { font-family: var(--vscode-editor-font-family); }
                .input-container {
                    display: flex;
                    width: 100%;
                    gap: 5px;
                }
                #input {
                    flex-grow: 1; 
                }
            </style>
        </head>
        <body>
            <h3>XvectR Chat</h3>
            <div id="chat"></div>

            <div class="input-container">
                <input id="input" type="text" placeholder="Type a message..." />
                <button id="sendBtn" onclick="send()">Send</button>
            </div>

            <script>
                const vscode = acquireVsCodeApi();
                const input = document.getElementById('input');
                const sendBtn = document.getElementById('sendBtn'); 
                document.getElementById('input').addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        send();
                    }
                });
                function setGeneratingState(isGenerating) {
                    // input.disabled = isGenerating;
                    sendBtn.disabled = isGenerating;
                    sendBtn.textContent = isGenerating ? 'Generating...' : 'Send';
                }

                function send() {
                    // const input = document.getElementById('chat');
                    const text = input.value;
                    if (!text) return;
                    input.value = '';
                    setGeneratingState(true);
                    vscode.postMessage({ type: 'chat', text: text });
                }
                let div = null;
                window.addEventListener('message', event => {
                    const chatContainer = document.getElementById('chat');

                    if (event.data.type === 'start') {  
                        div = document.createElement('div');
                        div.className = 'message';
                        // div.innerHTML = event.data.text;
                        chatContainer.appendChild(div);

                    } else if (event.data.type === 'render') {
                        if (div) {
                            div.innerHTML = event.data.text;
                        }
                    } else if (event.data.type === 'done') {
                        setGeneratingState(false);

                    } else if (event.data.type === 'user') {
                        const userdiv = document.createElement('div');
                        userdiv.className = 'message user-message';
                        userdiv.innerText = event.data.text;
                        chatContainer.appendChild(userdiv);
                    }

                    chatContainer.scrollTop = chatContainer.scrollHeight;
                });
            </script>
        </body>
        </html>
